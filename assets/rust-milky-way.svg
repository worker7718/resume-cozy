<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Muted reddish brown Milky Way texture">
  <defs>
    <linearGradient id="night" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#21120f"/>
      <stop offset="0.34" stop-color="#512015"/>
      <stop offset="0.58" stop-color="#8f4325"/>
      <stop offset="0.78" stop-color="#3d1b14"/>
      <stop offset="1" stop-color="#120d0b"/>
